services:
  wikimgr:
    build: .
    image: wikimgr:local
    container_name: wikimgr
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: always
    init: true
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - wikimgr_net

networks:
  wikimgr_net:
    driver: bridge
